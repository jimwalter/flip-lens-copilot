<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flip Lens - Search Results</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .header-meta {
      font-size: 14px;
      opacity: 0.9;
    }

    .source-url {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      font-size: 12px;
      word-break: break-all;
    }

    .source-url a {
      color: white;
      text-decoration: none;
    }

    .source-url a:hover {
      text-decoration: underline;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .screenshot {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .screenshot h2 {
      font-size: 16px;
      color: #333;
      margin-bottom: 15px;
    }

    .screenshot img {
      max-width: 100%;
      max-height: 400px;
      border-radius: 4px;
    }

    .results-section {
      margin-bottom: 30px;
    }

    .results-section h2 {
      font-size: 22px;
      color: #333;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #eee;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }

    .result-card {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    .result-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .result-image {
      width: 100%;
      height: 200px;
      background: #f0f0f0;
      object-fit: cover;
    }

    .result-content {
      padding: 12px;
    }

    .result-title {
      font-weight: 600;
      font-size: 14px;
      color: #333;
      margin-bottom: 8px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .result-price {
      color: #667eea;
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 8px;
    }

    .result-source {
      font-size: 11px;
      color: #999;
      margin-bottom: 8px;
    }

    .result-link {
      display: inline-block;
      font-size: 12px;
      color: #667eea;
      text-decoration: none;
      padding: 6px 8px;
      background: #f0f2ff;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .result-link:hover {
      background: #667eea;
      color: white;
    }

    .no-results {
      background: white;
      padding: 40px;
      border-radius: 8px;
      text-align: center;
      color: #999;
    }

    .no-results-icon {
      font-size: 48px;
      margin-bottom: 15px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📸 Your Search</h1>
      <div class="header-meta">
        Found results from Google Lens and related sources
      </div>
      <div class="source-url" id="source-url"></div>
    </div>

    <div class="screenshot" id="screenshot-section" style="display: none;">
      <h2>Original Screenshot</h2>
      <img id="original-screenshot" alt="Original screenshot">
    </div>

    <div id="results-container"></div>
  </div>

  <script src="search-results.js"></script>
</body>
</html>
